# Decap CMS Configuration with i18n support
# Documentation: https://decapcms.org/docs/

# Local backend for development (run: npx decap-server)
local_backend: true

backend:
  name: github
  repo: VATGenius/declarion
  branch: main
  base_url: https://declarion.tech
  auth_endpoint: /api/auth

# Enable Editorial Workflow for PR-based content review
publish_mode: editorial_workflow

# Media configuration
media_folder: public/images/uploads
public_folder: /images/uploads

# Site URL for preview
site_url: https://declarion.tech

# Logo for the CMS
logo_url: /images/logo.png

# i18n Configuration
i18n:
  structure: multiple_folders
  locales: [en, de, fr, es]
  default_locale: en

# Collections
collections:
  # News Collection (per language)
  - name: news-en
    label: "News (English)"
    label_singular: News Article
    folder: content/en/news
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string, required: true }
      - { label: Date, name: date, widget: datetime, required: true }
      - { label: Excerpt, name: excerpt, widget: text, required: true }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Body, name: body, widget: markdown, required: true }

  - name: news-de
    label: "News (Deutsch)"
    label_singular: News-Artikel
    folder: content/de/news
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Titel, name: title, widget: string, required: true }
      - { label: Datum, name: date, widget: datetime, required: true }
      - { label: Zusammenfassung, name: excerpt, widget: text, required: true }
      - { label: Hero-Bild, name: heroImage, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Inhalt, name: body, widget: markdown, required: true }

  - name: news-fr
    label: "News (Français)"
