      - { label: Résumé, name: excerpt, widget: text, required: true }
      - { label: Image, name: heroImage, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Contenu, name: body, widget: markdown, required: true }

  - name: news-es
